```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Assistant</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#0078ff;
color:white;
padding:40px 20px;
}

.buttons{
margin:20px;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
cursor:pointer;
}

.section{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
padding:10px;
width:80%;
max-width:500px;
margin:10px;
}

textarea{
height:150px;
}

footer{
background:#222;
color:white;
padding:15px;
margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>📚 AI Study Assistant</h1>
<p>Science, Physics, Chemistry & Mathematics</p>
</header>

<div class="buttons">
<button onclick="showSection('chat')">Chat</button>
<button onclick="showSection('quiz')">Quiz</button>
<button onclick="showSection('notes')">Notes</button>
</div>

<section id="chat" class="section">
<h2>AI Chat</h2>

<input
type="text"
id="question"
placeholder="Ask a question">

<br>

<button onclick="askQuestion()">Ask</button>

<p id="answer"></p>
</section>

<section
id="quiz"
class="section"
style="display:none;">

<h2>Quiz Section</h2>

<p>What is H₂O commonly called?</p>

<button onclick="checkAnswer('Water')">
Water
</button>

<button onclick="checkAnswer('Oxygen')">
Oxygen
</button>

<button onclick="checkAnswer('Hydrogen')">
Hydrogen
</button>

<p id="quizResult"></p>

</section>

<section
id="notes"
class="section"
style="display:none;">

<h2>Study Notes</h2>

<textarea
id="notesArea"
placeholder="Write your notes here...">
</textarea>

<br>

<button onclick="saveNotes()">
Save Notes
</button>

</section>

<footer>
© 2026 AI Study Assistant
</footer>

<script src="app.js"></script>

</body>
</html>
```
