<body>
    
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Assistant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 AI Study Assistant</h1>
    <p>Science, Physics, Chemistry & Math Learning</p>
</header>

<nav>
    <button onclick="showSection('chat')">Chat</button>
    <button onclick="showSection('quiz')">Quiz</button>
    <button onclick="showSection('notes')">Notes</button>
</nav>

<section id="chat" class="section">
    <h2>AI Chat</h2>
    <input type="text" id="question" placeholder="Ask a question...">
    <button onclick="askQuestion()">Ask</button>
    <div id="answer"></div>
</section>

<section id="quiz" class="section" style="display:none;">
    <h2>Quiz</h2>
    <p>What is H₂O?</p>
    <button onclick="checkAnswer('Water')">Water</button>
    <button onclick="checkAnswer('Oxygen')">Oxygen</button>
    <button onclick="checkAnswer('Hydrogen')">Hydrogen</button>
    <p id="quizResult"></p>
</section>

<section id="notes" class="section" style="display:none;">
    <h2>My Notes</h2>
    <textarea id="notesArea" placeholder="Write notes here..."></textarea>
    <button onclick="saveNotes()">Save Notes</button>
</section>

<script src="app.js"></script>
</body>
</html>
